<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Caleb Funderburk — Senior Cloud Solution Architect, Copilot &amp; AI at Microsoft. Personal projects, not official Microsoft guidance.">
  <style>
    /* One orchestrated boot, then silence. Nothing loops indefinitely. */
    .l  { opacity: 0; animation: reveal .01s linear forwards, type .55s steps(28) forwards; }
    .l1 { animation-delay: .25s, .25s; }
    .l2 { animation-delay: .95s, .95s; }
    .l3 { animation-delay: 1.55s, 1.55s; }
    .wm  { opacity: 0; letter-spacing: .12em; animation: resolve .7s cubic-bezier(.2,.7,.2,1) 2.15s forwards; }
    .sub { opacity: 0; animation: reveal .4s ease-out 2.55s forwards; }
    .dis { opacity: 0; animation: reveal .4s ease-out 2.95s forwards; }
    .cur { fill: #58A6FF; animation: blink 1s steps(1) 1.0s 5 forwards; }

    @keyframes reveal  { to { opacity: 1; } }
    @keyframes type    { from { clip-path: inset(0 100% 0 0); } to { clip-path: inset(0 0 0 0); } }
    @keyframes resolve { from { opacity: 0; letter-spacing: .34em; } to { opacity: 1; letter-spacing: .12em; } }
    @keyframes blink   { 50% { opacity: 0; } to { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      .l, .wm, .sub, .dis, .cur {
        opacity: 1 !important;
        animation: none !important;
        clip-path: none !important;
        letter-spacing: .12em;
      }
    }
  </style>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#E6EDF3" opacity="0.02"/>
    </pattern>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="984" height="264" rx="12" fill="#0E1424" stroke="#1E2637" stroke-width="1"/>

  <!-- title bar -->
  <circle cx="34" cy="30" r="5" fill="#3FB950" opacity="0.85"/>
  <circle cx="54" cy="30" r="5" fill="#D29922" opacity="0.85"/>
  <circle cx="74" cy="30" r="5" fill="#58A6FF" opacity="0.85"/>
  <text x="98" y="35" font-size="13" fill="#7D8590" letter-spacing="0.5">caleb@orchestrator:~$</text>
  <line x1="8" y1="52" x2="992" y2="52" stroke="#1E2637" stroke-width="1"/>

  <!-- boot sequence -->
  <text class="l l1" x="40" y="88"  font-size="15" fill="#7D8590">caleb@orchestrator:~$ <tspan fill="#E6EDF3">./boot --console</tspan></text>
  <text class="l l2" x="40" y="116" font-size="15" fill="#7D8590">initializing agents... <tspan fill="#3FB950">[ok]</tspan></text>
  <text class="l l3" x="40" y="144" font-size="15" fill="#7D8590">loading: <tspan fill="#58A6FF">copilot-studio</tspan> · <tspan fill="#39C5CF">mcp</tspan> · <tspan fill="#BC8CFF">foundry</tspan> · <tspan fill="#3FB950">cowork</tspan></text>
  <rect class="cur" x="489" y="132" width="9" height="15"/>

  <!-- resolved wordmark -->
  <circle cx="360" cy="192" r="120" fill="url(#glow)" opacity="0.6"/>
  <text class="wm"  x="40" y="204" font-size="38" font-weight="700" fill="#E6EDF3">CALEB FUNDERBURK</text>
  <text class="sub" x="42" y="232" font-size="14.5" fill="#7D8590">Sr. Cloud Solution Architect · <tspan fill="#58A6FF">Copilot &amp; AI</tspan> @ Microsoft</text>
  <text class="dis" x="42" y="256" font-size="12" fill="#586069">// personal projects — not official Microsoft guidance</text>

  <!-- texture: window-clipped scanlines -->
  <rect x="8" y="8" width="984" height="264" rx="12" fill="url(#scan)" pointer-events="none"/>
</svg>
